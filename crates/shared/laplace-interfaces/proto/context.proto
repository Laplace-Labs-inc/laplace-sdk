// KrepisContext: Sovereign Context representation in Protocol Buffers
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

/// Sovereign Context: canonical context object for all Laplace operations
///
/// Maps 1:1 to Rust SovereignContext structure. This is the Protocol Buffer
/// representation for cross-language serialization and RPC boundaries.
///
/// # Field Mappings (Rust → Proto3)
///
/// - request_id: String → string
/// - tenant_id: String → string
/// - trace_id: String → string
/// - priority: u8 (0-5) → uint32
/// - tier: u8 (0-4) → uint32
/// - is_turbo_mode: bool → bool
/// - timestamp: u64 (nanoseconds) → uint64
/// - turbo_slot: u32 → uint32
///
/// # Validation Rules
///
/// - priority: must be in range [0, 5]
/// - tier: must be in range [0, 4]
/// - if is_turbo_mode == true, then tier must support turbo (tier >= 2)
/// - request_id, tenant_id, trace_id must be non-empty
///
/// # Tier Levels
///
/// - 0: Free (limited resources, standard FFI only)
/// - 1: Standard (baseline performance, standard FFI)
/// - 2: Turbo (turbo-mode acceleration available)
/// - 3: Pro (enhanced resources, priority scheduling)
/// - 4: Enterprise (maximum resources, dedicated isolation)
///
/// # Priority Levels
///
/// - 0: Lowest
/// - 1: Low
/// - 2: Normal
/// - 3: High (default)
/// - 4: Critical
/// - 5: SystemCritical
///
/// # Turbo Slot
///
/// For zero-copy acceleration (turbo-mode):
/// - 0xFFFFFFFF (4294967295): No slot allocated (standard FFI)
/// - 0-N: Valid slot index in shared memory pool
message KrepisContext {
  /// Unique request identifier (UUID or snowflake format)
  /// Used for request deduplication and tracing
  string request_id = 1;

  /// Multi-tenant isolation scope
  /// Determines tenant billing and resource boundaries
  string tenant_id = 2;

  /// Request priority level for scheduling decisions
  /// Range: [0, 5] where 5 = SystemCritical
  /// Used by kernel scheduler under resource contention
  /// Default: 3 (High)
  uint32 priority = 3;

  /// Zero-copy acceleration flag
  /// true = shared memory FFI (requires tier >= 2)
  /// false = standard JSON/serialization FFI
  /// Default: false
  bool is_turbo_mode = 4;

  /// Distributed trace correlation identifier
  /// Propagated through all child operations for observability
  string trace_id = 5;

  /// Request creation timestamp (Unix nanoseconds since epoch)
  /// Used for latency measurement and timeout calculation
  /// Non-zero mandatory
  uint64 timestamp = 6;

  /// RESERVED: Previously used for arbitrary key-value metadata
  /// Removed in v1.3.0 to enforce explicit field definitions
  /// Field number 7 is reserved and must not be reused
  reserved 7;
  reserved "metadata";

  /// Tenant service tier (billing and performance class)
  /// Range: [0, 4]
  /// - 0: Free
  /// - 1: Standard (default)
  /// - 2: Turbo
  /// - 3: Pro
  /// - 4: Enterprise
  /// Determines resource limits and feature availability
  uint32 tier = 8;

  /// Physical slot index in shared memory pool (turbo-mode only)
  /// Semantics:
  /// - 4294967295 (0xFFFFFFFF, u32::MAX): Not allocated / standard FFI
  /// - 0-4294967294: Valid slot index (kernel-assigned)
  /// Only valid when is_turbo_mode == true
  /// Default: 4294967295
  uint32 turbo_slot = 9;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// KNUL Configuration (Kernel Networking Utility Link)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

/// QUIC server and transport layer configuration
message KnulConfig {
  /// Enable 0-RTT resumption (requires pre-shared keys)
  /// Reduces handshake latency for returning clients
  /// Default: false
  bool enable_0rtt = 1;

  /// Compression level for QUIC payload (0 = disabled, 1-9 = gzip levels)
  /// Higher values increase CPU but reduce bandwidth
  /// Recommended: 6 for balance
  /// Default: 0 (disabled)
  uint32 compression_level = 2;

  /// Maximum concurrent streams per QUIC connection
  /// Higher values increase memory but allow more parallelism
  /// Default: 100
  uint32 max_streams = 3;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RPC Message Types
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

/// Initialize kernel with sovereign context and network config
message InitializeRequest {
  /// The request context (tenant isolation, priority, turbo mode)
  KrepisContext context = 1;

  /// KNUL configuration for this initialization
  KnulConfig config = 2;
}

/// Response to initialization request
message InitializeResponse {
  /// Operation success indicator
  bool success = 1;

  /// Human-readable error message (empty on success)
  string error_message = 2;
}

